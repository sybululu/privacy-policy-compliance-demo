name: Sync to ModelScope

on:
  push:
    branches: [main]
    paths:
      - 'hf-deploy/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Push to ModelScope
        env:
          MS_TOKEN: ${{ secrets.MS_TOKEN }}
        run: |
          cd hf-deploy
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "sync"
          git branch -M main
          git remote add ms https://oauth2:${MS_TOKEN}@www.modelscope.cn/studios/sybululu/privacy-policy-checker.git
          git push -f ms main
